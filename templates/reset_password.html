{% extends "base.html" %} {% block content %}
<div class="form-container" style="max-width: 450px">
  <h2
    style="text-align: center; color: var(--primary-blue); margin-bottom: 2rem"
  >
    <i class="fas fa-lock"></i> Reset Password
  </h2>

  <div class="alert alert-success" style="margin-bottom: 1.5rem">
    <i class="fas fa-check-circle"></i>
    <strong>Your Reset Token:</strong> {{ token }}
  </div>

  <form action="{{ url_for('reset_password', token=token) }}" method="POST">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" name="password" class="form-control" required />
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input
        type="password"
        name="confirm_password"
        class="form-control"
        required
      />
    </div>

    <button type="submit" class="btn btn-primary btn-block">
      Reset Password
    </button>
  </form>

  <div style="text-align: center; margin-top: 1.5rem">
    <a href="{{ url_for('login') }}">Back to Login</a>
  </div>
</div>
{% endblock %}
