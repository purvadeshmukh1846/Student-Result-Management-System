{% extends "base.html" %} {% block content %}
<div class="form-container" style="max-width: 600px">
  <h2
    style="text-align: center; color: var(--primary-blue); margin-bottom: 2rem"
  >
    <i class="fas fa-user-plus"></i> Add New Teacher
  </h2>

  <form action="{{ url_for('add_teacher') }}" method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" class="form-control" required />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" class="form-control" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" class="form-control" required />
    </div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="full_name" class="form-control" required />
    </div>
    <div class="form-group">
      <label>Employee ID</label>
      <input type="text" name="employee_id" class="form-control" required />
    </div>
    <div class="form-group">
      <label>Department (optional)</label>
      <input type="text" name="department" class="form-control" />
    </div>
    <div class="form-group">
      <label>Qualification (optional)</label>
      <input type="text" name="qualification" class="form-control" />
    </div>
    <div class="form-group">
      <label>Experience (years, optional)</label>
      <input type="number" name="experience" class="form-control" />
    </div>

    <button type="submit" class="btn btn-primary btn-block">Add Teacher</button>
  </form>

  <div style="text-align: center; margin-top: 1rem">
    <a href="{{ url_for('admin_dashboard') }}">Back to Dashboard</a>
  </div>
</div>
{% endblock %}
