{% extends "base.html" %} {% block content %}
<div class="form-container" style="max-width: 450px">
  <h2
    style="text-align: center; color: var(--primary-blue); margin-bottom: 2rem"
  >
    <i class="fas fa-key"></i> Forgot Password
  </h2>

  <div class="alert alert-info" style="margin-bottom: 1.5rem">
    <i class="fas fa-info-circle"></i>
    <strong>College Project Note:</strong> Enter your email. A reset token will
    be shown on next screen.
  </div>

  <form action="{{ url_for('forgot_password') }}" method="POST">
    <div class="form-group">
      <label>Email Address</label>
      <input
        type="email"
        name="email"
        class="form-control"
        placeholder="Enter your registered email"
        required
      />
    </div>

    <button type="submit" class="btn btn-primary btn-block">
      Generate Reset Token
    </button>
  </form>

  <div style="text-align: center; margin-top: 1.5rem">
    <a href="{{ url_for('login') }}">Back to Login</a>
  </div>
</div>
{% endblock %}
